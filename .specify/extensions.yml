installed: []
settings:
  auto_execute_hooks: true
hooks:
  before_constitution:
  - extension: git
    command: speckit.git.initialize
    enabled: true
    optional: false
    prompt: Execute speckit.git.initialize?
    description: Initialize Git repository before constitution setup
    condition: null
  before_specify:
  - extension: git
    command: speckit.git.feature
    enabled: true
    optional: false
    prompt: Execute speckit.git.feature?
    description: Create feature branch before specification
    condition: null
  - extension: memory-loader
    command: speckit.memory-loader.load
    enabled: true
    optional: false
    prompt: Execute speckit.memory-loader.load?
    description: Load project memory files before specification
    condition: null
  before_clarify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before clarification?
    description: Auto-commit before spec clarification
    condition: null
  - extension: memory-loader
    command: speckit.memory-loader.load
    enabled: true
    optional: false
    prompt: Execute speckit.memory-loader.load?
    description: Load project memory files before clarification
    condition: null
  before_plan:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before planning?
    description: Auto-commit before implementation planning
    condition: null
  - extension: memory-loader
    command: speckit.memory-loader.load
    enabled: true
    optional: false
    prompt: Execute speckit.memory-loader.load?
    description: Load project memory files before planning
    condition: null
  before_tasks:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before task generation?
    description: Auto-commit before task generation
    condition: null
  - extension: memory-loader
    command: speckit.memory-loader.load
    enabled: true
    optional: false
    prompt: Execute speckit.memory-loader.load?
    description: Load project memory files before task generation
    condition: null
  - extension: plan-review-gate
    command: speckit.plan-review-gate.check
    enabled: true
    optional: false
    prompt: Execute speckit.plan-review-gate.check?
    description: Require a merge request before proceeding to task generation
    condition: null
  before_implement:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before implementation?
    description: Auto-commit before implementation
    condition: null
  - extension: memory-loader
    command: speckit.memory-loader.load
    enabled: true
    optional: false
    prompt: Execute speckit.memory-loader.load?
    description: Load project memory files before implementation
    condition: null
  - extension: superb
    command: speckit.superb.tdd
    enabled: true
    optional: false
    prompt: Execute speckit.superb.tdd?
    description: 'Mandatory TDD gate. Bridges an installed superpowers test-driven-development
      skill into the spec-kit task structure before any code is written.

      '
    condition: null
  - extension: spec-validate
    command: speckit.spec-validate.gate
    enabled: true
    optional: false
    prompt: Execute speckit.spec-validate.gate?
    description: Hard gate implementation on validation and review policy
    condition: null
  before_checklist:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before checklist?
    description: Auto-commit before checklist generation
    condition: null
  - extension: memory-loader
    command: speckit.memory-loader.load
    enabled: true
    optional: false
    prompt: Execute speckit.memory-loader.load?
    description: Load project memory files before checklist generation
    condition: null
  before_analyze:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before analysis?
    description: Auto-commit before analysis
    condition: null
  - extension: memory-loader
    command: speckit.memory-loader.load
    enabled: true
    optional: false
    prompt: Execute speckit.memory-loader.load?
    description: Load project memory files before analysis
    condition: null
  before_taskstoissues:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before issue sync?
    description: Auto-commit before tasks-to-issues conversion
    condition: null
  after_constitution:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit constitution changes?
    description: Auto-commit after constitution update
    condition: null
  after_specify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit specification changes?
    description: Auto-commit after specification
    condition: null
  - extension: spec-validate
    command: speckit.spec-validate.validate
    enabled: true
    optional: true
    prompt: Spec generated. Run comprehension validation now?
    description: Run spec validation after specification is generated
    condition: null
  after_clarify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit clarification changes?
    description: Auto-commit after spec clarification
    condition: null
  after_plan:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit plan changes?
    description: Auto-commit after implementation planning
    condition: null
  after_tasks:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit task changes?
    description: Auto-commit after task generation
    condition: null
  - extension: superb
    command: speckit.superb.review
    enabled: true
    optional: true
    prompt: Review tasks.md for coverage and TDD-readiness before implementation?
    description: 'Catches missing or under-specified tasks at planning time. Produces
      a requirement coverage and TDD-readiness report. Bridge-native logic.

      '
    condition: null
  - extension: spec-validate
    command: speckit.spec-validate.validate-tasks
    enabled: true
    optional: true
    prompt: Tasks generated. Run task validation now?
    description: Run task validation after tasks are generated
    condition: null
  - extension: agent-assign
    command: speckit.agent-assign.assign
    enabled: true
    optional: true
    prompt: Assign agents to the generated tasks?
    description: Automatically assign specialized agents to tasks after generation
    condition: null
  - extension: fleet
    command: speckit.fleet.review
    enabled: true
    optional: true
    prompt: Run cross-model review to evaluate plan and tasks before implementation?
    description: Pre-implementation review gate
    condition: null
  after_implement:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit implementation changes?
    description: Auto-commit after implementation
    condition: null
  - extension: retrospective
    command: speckit.retrospective.analyze
    enabled: true
    optional: true
    prompt: Run retrospective analysis now? (spec changes require explicit confirmation)
    description: Offer a retrospective after implementation without modifying spec
      unless approved.
    condition: null
  - extension: superb
    command: speckit.superb.verify
    enabled: true
    optional: false
    prompt: Execute speckit.superb.verify?
    description: 'Mandatory completion gate. Bridges an installed superpowers verification-before-completion
      skill and extends it with spec-kit spec-coverage checks. Prevents false completions.

      '
    condition: null
  - extension: bugfix
    command: speckit.bugfix.verify
    enabled: true
    optional: true
    prompt: Run bugfix consistency check after implementation?
    description: Verify spec artifact consistency after implementation completes
    condition: null
  - extension: cleanup
    command: speckit.cleanup.run
    enabled: true
    optional: true
    prompt: Run cleanup to review implementation changes and identify tech debt?
    description: Post-implementation quality gate
    condition: null
  - extension: fix-findings
    command: speckit.fix-findings.run
    enabled: true
    optional: true
    prompt: Run fix-findings to analyze and resolve spec findings automatically?
    description: Post-implementation automated finding resolution
    condition: null
  - extension: learn
    command: speckit.learn.review
    enabled: true
    optional: true
    prompt: Generate a learning guide from this implementation?
    description: ''
    condition: null
  - extension: review
    command: speckit.review.run
    enabled: true
    optional: true
    prompt: Run PR review on implemented changes?
    description: Comprehensive review after implementation
    condition: null
  after_checklist:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit checklist changes?
    description: Auto-commit after checklist generation
    condition: null
  after_analyze:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit analysis results?
    description: Auto-commit after analysis
    condition: null
  after_taskstoissues:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit after syncing issues?
    description: Auto-commit after tasks-to-issues conversion
    condition: null
